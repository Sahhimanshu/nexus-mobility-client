version: '3.9'

services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus_mobility
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_mobility"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ───────────────────────────────────
  backend:
    build:
      context: ./nexus-mobility-backend
      dockerfile: Dockerfile
    container_name: nexus_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: nexus_mobility
      DB_USER: nexus
      DB_PASS: nexus_secret
      JWT_SECRET: change-this-to-a-very-long-random-secret-key-256-bits
      CORS_ORIGINS: http://localhost:3000
      PORT: 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./nexus-mobility
      dockerfile: Dockerfile
    container_name: nexus_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080/api/v1
    ports:
      - "3000:3000"

volumes:
  postgres_data:
